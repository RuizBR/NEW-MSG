<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 Team Chatbox</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="bg-mesh">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div id="auth-screen" class="auth-wrap">
  <div class="auth-card">
    <h1>💬 Team Chatbox</h1>
    <div class="tabs">
      <button class="tab-btn active" data-tab="login">Login</button>
      <button class="tab-btn" data-tab="register">Register</button>
    </div>

    <div id="login-tab" class="tab-panel active">
      <input type="text" id="login-username" placeholder="Username">
      <input type="password" id="login-password" placeholder="Password">
      <button id="login-btn" class="primary-btn">Login</button>
      <p id="login-msg" class="msg"></p>
    </div>

    <div id="register-tab" class="tab-panel">
      <input type="text" id="reg-username" placeholder="New Username">
      <input type="password" id="reg-password" placeholder="New Password">
      <button id="reg-btn" class="primary-btn">Register</button>
      <p id="reg-msg" class="msg"></p>
    </div>
  </div>
</div>

<div id="chat-screen" class="chat-app hidden">
  
  <input type="checkbox" id="sidebar-toggle" class="sidebar-checkbox">
  <label for="sidebar-toggle" class="sidebar-toggle-btn"><span></span></label>

  <aside class="sidebar">
    <div class="sidebar-header">
      <span id="me-label"></span>
      <button id="logout-btn" class="link-btn">Logout</button>
    </div>

    <div class="online-users">
      <h4 id="online-count">🟢 Online Users (0)</h4>
      <ul id="online-list"></ul>
    </div>

    <label class="field-label">Send To</label>
    <select id="recipient-select">
      <option value="all">🌐 All (public)</option>
    </select>

    <button id="clear-btn" class="secondary-btn">🧹 Clear Chat</button>

    <textarea id="chat-input" placeholder="Type a message..." rows="3"></textarea>
    <button id="send-btn" class="primary-btn">Send</button>

    <label class="field-label">📎 Attach file</label>
    <input type="file" id="file-input">
    <button id="send-file-btn" class="secondary-btn">Send File</button>

    <div id="video-section" class="video-section hidden">
      <hr>
      <h4>📹 Private Video Call</h4>
      <div id="video-controls"></div>
    </div>
  </aside>

  <main class="chat-main">
    <h2 id="chat-title">🌐 Public Chat</h2>
    <p id="typing-indicator" class="typing-indicator"></p>
    <div class="chat-container">
      <div id="chat-box" class="chat-box"></div>
    </div>
  </main>
</div>

<script src="/static/script.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const toggle = document.getElementById("sidebar-toggle");
    const recipientSelect = document.getElementById("recipient-select");
    const chatMain = document.querySelector(".chat-main");
    const onlineList = document.getElementById("online-list");
    const meLabel = document.getElementById("me-label");

    // Rebuilds dropdown options dynamically by scraping the current active sidebar user elements
    const forceSyncDropdown = () => {
      const currentSelection = recipientSelect.value;
      
      // Clear and set public default option
      recipientSelect.innerHTML = '<option value="all">🌐 All (public)</option>';
      
      // Clean up your own username safely
      let myUsername = meLabel ? meLabel.textContent.trim() : "";
      myUsername = myUsername.replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD00-\uDFFF]/g, "").trim();

      // Scrape whatever list items currently exist in the online panel container
      const userItems = onlineList.querySelectorAll("li");
      
      userItems.forEach(item => {
        // Strip out emojis, status dots, and extra whitespace padding
        let targetName = item.textContent.trim();
        targetName = targetName.replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD00-\uDFFF]/g, "").trim();
        
        // Remove common status words or characters if they exist
        targetName = targetName.replace(/^🟢|^🔴|^⚪/, "").trim();

        // Populate option if it's valid and isn't yourself
        if (targetName && targetName !== myUsername) {
          const opt = document.createElement("option");
          opt.value = targetName;
          opt.textContent = `🔒 Private: ${targetName}`;
          recipientSelect.appendChild(opt);
        }
      });

      // Re-apply focus selection state safely
      recipientSelect.value = currentSelection;
      if (!recipientSelect.value) recipientSelect.value = "all";
    };

    // Rebuild options on structural DOM changes...
    if (onlineList) {
      const observer = new MutationObserver(forceSyncDropdown);
      observer.observe(onlineList, { childList: true, subtree: true });
    }

    // ...AND rebuild instantly whenever you click/tap the dropdown (Intercepts main script wipes)
    if (recipientSelect) {
      recipientSelect.addEventListener("mousedown", forceSyncDropdown);
      recipientSelect.addEventListener("touchstart", forceSyncDropdown);
      
      recipientSelect.addEventListener("change", () => {
        if (window.innerWidth <= 768) toggle.checked = false;
      });
    }

    if (chatMain) {
      chatMain.addEventListener("click", () => {
        if (window.innerWidth <= 768) toggle.checked = false;
      });
    }
  });
</script>
</body>
</html>
